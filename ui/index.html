<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ikbi · Dashboard</title>
<link rel="stylesheet" href="ikbi.css">
</head>
<body>
<div id="ikbi-app">
  <!-- ═══ HEADER ═══ -->
  <header id="hdr">
    <div class="hdr-brand">
      <span class="hdr-logo">⚙</span>
      <span class="hdr-title">ikbi</span>
      <span class="hdr-sub">build engine</span>
    </div>
    <div class="hdr-status">
      <span id="engine-dot" class="dot dot-amber"></span>
      <span id="engine-label">checking…</span>
    </div>
  </header>

  <!-- ═══ 1. RUNTIME TUI ═══ -->
  <section id="tui" class="panel">
    <div class="panel-head">
      <span class="panel-title">Runtime</span>
      <span id="tui-status" class="tui-status-idle">
        <span class="tui-status-dot"></span> idle
      </span>
    </div>
    <div id="tui-log" class="tui-log"></div>
    <form id="tui-form" class="tui-input-bar">
      <span class="tui-prompt" aria-hidden="true">❯</span>
      <input id="tui-input" type="text" autocomplete="off" spellcheck="false"
             placeholder="Run a command — try: help">
      <button type="submit" class="tui-run-btn">Run</button>
    </form>
  </section>

  <!-- ═══ 2. CHAT WITH PEH ═══ -->
  <section id="chat" class="panel">
    <div class="panel-head">
      <span class="panel-title">Chat with Peh</span>
    </div>
    <div id="chat-msgs" class="chat-msgs"></div>
    <form id="chat-form" class="chat-input-bar">
      <input id="chat-input" type="text" autocomplete="off" spellcheck="false"
             placeholder="Ask Peh — the medicine man…">
      <button type="submit" class="chat-send-btn">Send</button>
    </form>
  </section>

  <!-- ═══ 3. HOTSPOT WINDOWS TOOLBAR ═══ -->
  <div id="win-toolbar" class="win-toolbar">
    <span class="win-toolbar-label">Windows:</span>
    <button class="win-toggle active" data-win="job-cards">Job Cards</button>
    <button class="win-toggle active" data-win="repo-doctor">Repo Doctor</button>
    <button class="win-toggle" data-win="spec-artifact">Spec Artifact</button>
    <button class="win-toggle" data-win="build-history">Build History</button>
    <button class="win-toggle" data-win="modules">Modules</button>
    <button class="win-toggle" data-win="config">Configuration</button>
    <button class="win-toggle" data-win="corrections">Corrections</button>
  </div>

  <!-- ═══ 3a. HOTSPOT WINDOWS CONTAINER ═══ -->
  <section id="win-area" class="win-area">
    <!-- Job Cards -->
    <div class="hw" id="hw-job-cards" data-win="job-cards">
      <div class="hw-head">
        <span class="hw-title">Job Cards</span>
        <div class="hw-actions">
          <button class="hw-btn" onclick="Ikbui.refreshJobCards()" title="Refresh">↻</button>
          <button class="hw-btn hw-min" data-action="minimize" title="Minimize">─</button>
          <button class="hw-btn hw-close" data-action="close" title="Close">✕</button>
        </div>
      </div>
      <div class="hw-body" id="hw-job-cards-body"></div>
    </div>

    <!-- Repo Doctor -->
    <div class="hw" id="hw-repo-doctor" data-win="repo-doctor">
      <div class="hw-head">
        <span class="hw-title">Repo Doctor</span>
        <div class="hw-actions">
          <button class="hw-btn" onclick="Ikbui.scanRepoDoctor()" title="Scan">🔍</button>
          <button class="hw-btn hw-min" data-action="minimize" title="Minimize">─</button>
          <button class="hw-btn hw-close" data-action="close" title="Close">✕</button>
        </div>
      </div>
      <div class="hw-body" id="hw-repo-doctor-body"></div>
    </div>

    <!-- Spec Artifact -->
    <div class="hw hidden" id="hw-spec-artifact" data-win="spec-artifact">
      <div class="hw-head">
        <span class="hw-title">Spec Artifact</span>
        <div class="hw-actions">
          <button class="hw-btn" onclick="Ikbui.refreshSpecs()" title="Refresh">↻</button>
          <button class="hw-btn hw-min" data-action="minimize" title="Minimize">─</button>
          <button class="hw-btn hw-close" data-action="close" title="Close">✕</button>
        </div>
      </div>
      <div class="hw-body" id="hw-spec-artifact-body"></div>
    </div>

    <!-- Build History -->
    <div class="hw hidden" id="hw-build-history" data-win="build-history">
      <div class="hw-head">
        <span class="hw-title">Build History</span>
        <div class="hw-actions">
          <button class="hw-btn" onclick="Ikbui.refreshHistory()" title="Refresh">↻</button>
          <button class="hw-btn hw-min" data-action="minimize" title="Minimize">─</button>
          <button class="hw-btn hw-close" data-action="close" title="Close">✕</button>
        </div>
      </div>
      <div class="hw-body" id="hw-build-history-body"></div>
    </div>

    <!-- Modules -->
    <div class="hw hidden" id="hw-modules" data-win="modules">
      <div class="hw-head">
        <span class="hw-title">Modules</span>
        <div class="hw-actions">
          <button class="hw-btn" onclick="Ikbui.refreshModules()" title="Refresh">↻</button>
          <button class="hw-btn hw-min" data-action="minimize" title="Minimize">─</button>
          <button class="hw-btn hw-close" data-action="close" title="Close">✕</button>
        </div>
      </div>
      <div class="hw-body" id="hw-modules-body"></div>
    </div>

    <!-- Configuration -->
    <div class="hw hidden" id="hw-config" data-win="config">
      <div class="hw-head">
        <span class="hw-title">Configuration</span>
        <div class="hw-actions">
          <button class="hw-btn" onclick="Ikbui.refreshConfig()" title="Refresh">↻</button>
          <button class="hw-btn hw-min" data-action="minimize" title="Minimize">─</button>
          <button class="hw-btn hw-close" data-action="close" title="Close">✕</button>
        </div>
      </div>
      <div class="hw-body" id="hw-config-body"></div>
    </div>

    <!-- Corrections Library -->
    <div class="hw hidden" id="hw-corrections" data-win="corrections">
      <div class="hw-head">
        <span class="hw-title">Corrections</span>
        <div class="hw-actions">
          <button class="hw-btn" onclick="Ikbui.refreshCorrections()" title="Refresh">↻</button>
          <button class="hw-btn hw-min" data-action="minimize" title="Minimize">─</button>
          <button class="hw-btn hw-close" data-action="close" title="Close">✕</button>
        </div>
      </div>
      <div class="hw-body" id="hw-corrections-body"></div>
    </div>
  </section>
</div>

<script src="api.js"></script>
<script src="peh-guide.js"></script>
<script src="scenes.js"></script>
<script src="app.js"></script>
</body>
</html>
